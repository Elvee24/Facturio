<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturio | Billing & Invoicing</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
</head>
<body data-theme="dark" data-lang="en">

    <main class="container">
        <header>
            <div class="logo-area">
                <span class="logo-icon"><img src="FacturioIcon.png" alt="Logo"></img></span>
                <h1>Facturio</h1>
            </div>
            <div class="controls">
                <button class="lang-toggle" id="lang-toggle">PT</button>
                <button class="theme-toggle" id="theme-toggle"></button>
            </div>
        </header>

        <section class="hero">
            <p class="tagline" data-en="Invoicing &amp Billing made simple " data-pt="Faturar de maneira simples"></p>
            <p class="sub-tagline" 
               data-en="Facturio streamlines your entire billing lifecycle, allowing you to focus on growth." 
               data-pt="O Facturio simplifica todo o seu ciclo de faturação, permitindo que se foque no crescimento."></p>
            
            <a href="FacturioSetup.exe" class="download-btn">
                <span class="download-icon">📥</span>
                <span data-en="Download for Windows" data-pt="Descarregar para Windows"></span>
            </a>
        </section>

       <section class="preview-container">
        <div class="laptop">
            <div class="laptop-screen">
                <div class="app-ui-desktop">
                    <div class="sidebar"></div>
                    <div class="main-content">
                        <div class="chart-line"></div>
                            <div class="stats-row">
                            <div class="stat-card"></div>
                            <div class="stat-card"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="laptop-base"></div>
    </div>

    <div class="phone">
        <div class="phone-screen">
            <div class="app-ui-mobile">
                <div class="mobile-header"></div>
                <div class="mobile-invoice"></div>
                <div class="mobile-invoice"></div>
                <div class="mobile-button"></div>
            </div>
        </div>
        <div class="phone-button"></div>
    </div>
</section>

        <section class="features">
            <div class="feature-card">
                <span class="feature-icon">✨</span>
                <h3 data-en="Instant Setup" data-pt="Configuração Instantânea"></h3>
                <p data-en="Configured for 2026." data-pt="Configurado para 2026."></p>
            </div>
            <div class="feature-card">
                <span class="feature-icon">🔒</span>
                <h3 data-en="Secure" data-pt="Seguro"></h3>
                <p data-en="Bank-grade encryption." data-pt="Encriptação bancária."></p>
            </div>
            <div class="feature-card">
                <span class="feature-icon">📊</span>
                <h3 data-en="Pro Dashboard" data-pt="Painel Profissional"></h3>
                <p data-en="Visual analytics." data-pt="Análises visuais."></p>
            </div>
        </section>
    </main>

    <script>
        const body = document.body;
        const themeBtn = document.getElementById('theme-toggle');
        const langBtn = document.getElementById('lang-toggle');

        // Theme JS
        themeBtn.addEventListener('click', () => {
            const newTheme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // Language JS
        const updateText = (lang) => {
            document.querySelectorAll('[data-en]').forEach(el => {
                el.textContent = el.getAttribute(`data-${lang}`);
            });
            langBtn.textContent = lang === 'en' ? 'PT' : 'EN';
        };

        langBtn.addEventListener('click', () => {
            const newLang = body.getAttribute('data-lang') === 'en' ? 'pt' : 'en';
            body.setAttribute('data-lang', newLang);
            updateText(newLang);
            localStorage.setItem('lang', newLang);
        });
        
        const savedLang = localStorage.getItem('lang') || 'en';
        body.setAttribute('data-lang', savedLang);
        updateText(savedLang);
    </script>
</body>
</html>
