<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturio</title>
    <link rel="icon" type="image/png" href="/Icons/favicon.ico">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
</head>
<body data-theme="dark" data-lang="en">

    <main class="container">
        <header>
            <div class="logo-area">
                <span class="logo-icon"><img src="/Icons/FacturioIcon.png" alt="Logo"></img></span>
                <h1>Facturio</h1>
            </div>
            <div class="controls">
                <button class="lang-toggle" id="lang-toggle">PT</button>
                <button class="theme-toggle" id="theme-toggle"></button>
            </div>
        </header>

        <section class="hero">
            <p class="tagline" data-en="Invoicing &amp Billing made simple " data-pt="Faturar de maneira simples"></p>
            <p class="sub-tagline" 
               data-en="Facturio streamlines your entire billing lifecycle, allowing you to focus on growth." 
               data-pt="O Facturio simplifica todo o seu ciclo de faturação, permitindo que se foque no crescimento."></p>

            <div class="download-group">
            <a href="FacturioSetup.exe" class="download-btn windows">
                <span class="download-icon windows"><img src="/Icons/Windows.png" alt="Windows"></img></span>
                <span data-en="Download for Windows" data-pt="Descarregar para Windows"></span>
            </a>

            <a href="Facturio_macOS.dmg" class="download-btn mac">
                <span class="download-icon mac"><img src="/Icons/Mac.png" alt="Mac"></span> 
                <span data-en="Download for macOS" data-pt="Descarregar para macOS"></span>
            </a>

            <a href="Facturio_Linux.sh" class="download-btn linux">
                <span class="download-icon linux"><img src="/Icons/Linux.png" alt="Linux"></span> 
                <span data-en="Download for Linux" data-pt="Descarregar para Linux"></span>
            </a>
            </div>
        </section>

       <section class="preview-container">
        <div class="laptop">
            <div class="laptop-screen">
                <img src="/Images/DesktopDark.jpeg" alt="Desktop Dark Mode" class="desktop-dark-image">
                <img src="/Images/DesktopLight.jpeg" alt="Desktop Light Mode" class="desktop-light-image">
            </div>
            <div class="laptop-base"></div>
        </div>
        </div>

    <div class="phone">
        <div class="phone-screen">
                <img src="/Images/MobileDark.jpeg" alt="Mobile Dark Mode class="mobile-dark-image">
                <img src="/Images/MobileLight.jpeg" alt="Mobile Light Mode class="mobile-light-image">
        </div>
    </div>
</section>

        <section class="features">
            <div class="feature-card">
                <span class="feature-icon">✨</span>
                <h3 data-en="Widely Compatible" data-pt="Amplamente Compatível"></h3>
                <p data-en="✅ Android (API 21+)" data-pt="✅ Android (API 21+)"></p>
                <p data-en="✅ iOS (iOS 12+)" data-pt="✅ iOS (iOS 12+)"></p>
                <p data-en="✅ Desktop (Windows, macOS, Linux)" data-pt="✅ Desktop (Windows, macOS, Linux)"></p>
            </div>
            <div class="feature-card">
                <span class="feature-icon">🔒</span>
                <h3 data-en="All Local, No Login required!" data-pt="Tudo Local, Sem Login!"></h3>
                <p data-en="The data is saved locally on the device using Hive." data-pt="Os dados são guardados localmente no dispositivo usando Hive."></p>
            </div>
            <div class="feature-card">
                <span class="feature-icon">📊</span>
                <h3 data-en="Dashboard" data-pt="Painel Profissional"></h3>
                <p data-en="📈 General vision with statistics" data-pt="📈 Visão geral com estatísticas"></p>
                <p data-en="⚠️ Low Stock alerts" data-pt="⚠️ Alertas de stock baixo"></p>
                <p data-en="📄 Latest invoices registered" data-pt="📄 Últimas faturas registadas"></p>
            </div>
        </section>
    </main>

    <script>
        const body = document.body;
        const themeBtn = document.getElementById('theme-toggle');
        const langBtn = document.getElementById('lang-toggle');

        // Theme JS
        themeBtn.addEventListener('click', () => {
            const newTheme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // Language JS
        const updateText = (lang) => {
            document.querySelectorAll('[data-en]').forEach(el => {
                el.textContent = el.getAttribute(`data-${lang}`);
            });
            langBtn.textContent = lang === 'en' ? 'PT' : 'EN';
        };

        langBtn.addEventListener('click', () => {
            const newLang = body.getAttribute('data-lang') === 'en' ? 'pt' : 'en';
            body.setAttribute('data-lang', newLang);
            updateText(newLang);
            localStorage.setItem('lang', newLang);
        });
        
        const savedLang = localStorage.getItem('lang') || 'en';
        body.setAttribute('data-lang', savedLang);
        updateText(savedLang);
    </script>
</body>
</html>
